name: Dependency Review

on:
  pull_request:
    branches: [main]

jobs:
  dependency-review:
    name: Review dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
