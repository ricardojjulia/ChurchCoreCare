# ─────────────────────────────────────────────────────────────────────────────
# Faith Counseling — Prometheus scrape configuration
#
# Used by the Prometheus container started with:
#   docker compose --profile observability up -d
#
# Each service exposes Prometheus-format metrics at GET /metrics using the
# OpenTelemetry Prometheus exporter.  Prometheus scrapes on a 15-second
# interval via host.docker.internal so it can reach services running on
# the host machine outside Docker.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'development'
    project: 'faith-counseling'

scrape_configs:
  # ── faith-api (Node.js REST API, port 3001) ──────────────────────────────────
  - job_name: 'faith-api'
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: 'faith-api'
    metrics_path: /metrics
    scrape_interval: 15s

  # ── faith-web (Node.js web server + BFF proxy, port 3002) ───────────────────
  - job_name: 'faith-web'
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          service: 'faith-web'
    metrics_path: /metrics
    scrape_interval: 15s

  # ── reminder-worker (background job process, dedicated metrics port 9465) ───
  - job_name: 'faith-worker'
    static_configs:
      - targets: ['host.docker.internal:9465']
        labels:
          service: 'reminder-worker'
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
