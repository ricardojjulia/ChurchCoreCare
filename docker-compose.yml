version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: faith-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: HAPPY47202!
      MYSQL_DATABASE: faith_counseling
      MYSQL_USER: faith_app
      MYSQL_PASSWORD: HAPPY522026!
    ports:
      - '3306:3306'
    volumes:
      - faith_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-ufaith_app', '-pHAPPY522026!']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  faith_mysql_data:
